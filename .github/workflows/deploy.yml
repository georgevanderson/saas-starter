name: deploy
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  GCP_PROJECT: unbundle-paas
  GCP_REGION: us-central1
  AR_REPO: saas-starter
  SERVICE: saas-starter
  IMAGE_PATH: us-central1-docker.pkg.dev/unbundle-paas/saas-starter/app

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          IMAGE="${{ env.IMAGE_PATH }}:${{ github.sha }}"
          docker build -t "$IMAGE" -t "${{ env.IMAGE_PATH }}:latest" .
          docker push "$IMAGE"
          docker push "${{ env.IMAGE_PATH }}:latest"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${{ env.SERVICE }}" \
            --image "$IMAGE" \
            --region "${{ env.GCP_REGION }}" \
            --platform managed \
            --quiet
